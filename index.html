<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Will you go out with me?</title>
  <link rel="stylesheet" href="styles.css?v=3">
</head>
<body>

<!-- ============ CREATOR ============ -->
<div id="creator" class="card" hidden>
  <h1>Make your invite ✨</h1>
  <p style="margin-top:0; color:#7a6471;">Fill this in — you'll get a link to send her.</p>

  <form id="creator-form" novalidate>
    <div>
      <label class="field" for="name">Her name <span class="req">*</span></label>
      <input type="text" id="name" required placeholder="e.g. Ana" autocomplete="off">
    </div>

    <div>
      <label class="field">Her photo</label>
      <label class="file-drop" id="drop-zone">
        <input type="file" id="image" accept="image/*">
        <div id="drop-text">Click or drag an image here</div>
        <img id="preview" class="preview" alt="">
      </label>
    </div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
      <div>
        <label class="field" for="date">Date</label>
        <input type="date" id="date">
      </div>
      <div>
        <label class="field" for="time">Time</label>
        <input type="time" id="time">
      </div>
    </div>

    <div>
      <label class="field" for="place">Place</label>
      <input type="text" id="place" placeholder="e.g. Café Lou, 7th &amp; Main">
    </div>

    <div>
      <label class="field" for="message">Sweet note</label>
      <textarea id="message" placeholder="Anything you'd like to say..."></textarea>
    </div>

    <details class="advanced">
      <summary>Advanced settings ✨</summary>
      <div class="advanced-body">
        <div>
          <label class="field" for="ask-phrase">
            Ask phrase
            <span class="counter"><span id="ask-count">0</span>/80</span>
          </label>
          <input type="text" id="ask-phrase" maxlength="80"
                 placeholder="will you go out with me?" autocomplete="off">
          <div class="hint" style="margin-top:4px;">Shown as: "{her name}, {ask phrase}"</div>
        </div>

        <div>
          <label class="field">Theme</label>
          <div class="theme-picker" id="theme-picker">
            <button type="button" class="theme-swatch active" data-theme="default">
              <span class="swatch-preview t-default"></span>
              <span>Sweetheart</span>
            </button>
            <button type="button" class="theme-swatch" data-theme="ocean">
              <span class="swatch-preview t-ocean"></span>
              <span>Ocean</span>
            </button>
            <button type="button" class="theme-swatch" data-theme="sunset">
              <span class="swatch-preview t-sunset"></span>
              <span>Sunset</span>
            </button>
            <button type="button" class="theme-swatch" data-theme="mint">
              <span class="swatch-preview t-mint"></span>
              <span>Mint</span>
            </button>
            <button type="button" class="theme-swatch" data-theme="lavender">
              <span class="swatch-preview t-lavender"></span>
              <span>Lavender</span>
            </button>
          </div>
        </div>
      </div>
    </details>

    <button type="submit" class="btn-primary">Generate link 💌</button>
    <div id="creator-error" class="error"></div>
  </form>

  <div id="link-output" class="link-output" hidden>
    <div style="font-weight:700;">Send her this link:</div>
    <div class="link-result" id="link-result"></div>
    <button type="button" class="copy-btn" id="copy-btn">Copy link</button>
    <div class="hint">
      The link is long because the photo is embedded. In a chat it shows as a normal preview card.
    </div>
  </div>
</div>

<!-- ============ VIEWER ============ -->
<div id="viewer" class="card" hidden>
  <img id="g-photo" class="girl-photo" alt="">
  <div class="ask" id="g-ask"></div>
  <div class="details">
    <div class="row"><span class="label">When</span><span id="g-when"></span></div>
    <div class="row"><span class="label">Where</span><span id="g-where"></span></div>
  </div>
  <p class="note" id="g-message" hidden></p>

  <div class="answer-buttons" id="answer-buttons">
    <button class="btn-yes" id="btn-yes">Yes! 💖</button>
    <button class="btn-no"  id="btn-no">No</button>
  </div>

  <div class="confirmation" id="confirmation">
    <div class="check">💖</div>
    <h2>Yay! It's a date!</h2>
    <p id="conf-text"></p>
  </div>
</div>

<script src="app.js?v=3"></script>
</body>
</html>
